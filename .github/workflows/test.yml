name: Comprehensive Testing

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel a previous run when the same branch/PR is pushed again, so force-pushes don't
# leave hour-long zombie runs piling up.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    # Hard cap: without this, a hung step runs to GitHub's 6-hour default and never
    # reports logs. With it, a hang fails fast and the step logs become visible.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests with coverage
        run: yarn test:coverage

      # Split the former `playwright install --with-deps chromium` into two steps so a
      # hang localizes to either the apt system-deps install or the browser-binary
      # download, and each fails fast with its own logs instead of freezing the job.
      - name: Install Playwright system deps (apt)
        timeout-minutes: 8
        run: yarn playwright install-deps chromium

      - name: Install Playwright Chromium browser
        timeout-minutes: 8
        run: yarn playwright install chromium

      - name: Run E2E tests (chromium only)
        timeout-minutes: 15
        run: yarn exec playwright test -- --project=chromium --workers=1 --reporter=line

      - name: Run parity gate (core tools must match committed legacy goldens)
        timeout-minutes: 10
        run: yarn test:parity

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
