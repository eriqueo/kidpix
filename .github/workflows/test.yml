name: Comprehensive Testing

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel a previous run when the same branch/PR is pushed again, so force-pushes don't
# leave hour-long zombie runs piling up.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    # Hard cap: without this, a hung step runs to GitHub's 6-hour default and never
    # reports logs. With it, a hang fails fast and the step logs become visible.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests with coverage
        run: yarn test:coverage

      # Split the former `playwright install --with-deps chromium` into two steps so a
      # hang localizes to either the apt system-deps install or the browser-binary
      # download, and each fails fast with its own logs instead of freezing the job.
      - name: Install Playwright system deps (apt)
        timeout-minutes: 8
        run: yarn playwright install-deps chromium

      # Cache the downloaded browser so the flaky download only has to succeed once;
      # subsequent runs restore it and skip the install entirely.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-1.56.1-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      # Root cause of the old job hang: Playwright's browser download intermittently
      # stalls at 100% on hosted runners — all bytes arrive, but the connection never
      # signals completion, so the process waits forever. Fix: bound each attempt with
      # `timeout` so a hung download is killed and retried with a fresh connection
      # (a successful install finishes in seconds), instead of freezing the whole job.
      - name: Install Playwright Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 14
        run: |
          for attempt in 1 2 3; do
            echo "::group::Chromium install attempt $attempt"
            if timeout --kill-after=10 240 yarn playwright install chromium; then
              echo "::endgroup::"
              echo "Chromium installed on attempt $attempt."
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt hung or failed; retrying with a fresh connection..."
          done
          echo "All Chromium install attempts failed." >&2
          exit 1

      - name: Run E2E tests (chromium only)
        timeout-minutes: 15
        run: yarn exec playwright test -- --project=chromium --workers=1 --reporter=line

      - name: Run parity gate (core tools must match committed legacy goldens)
        timeout-minutes: 10
        run: yarn test:parity

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
